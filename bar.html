<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Showcase</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        .car-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .car-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 250px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .car-card img {
            width: 100%;
            border-radius: 8px;
        }

        .car-card h3 {
            color: #333;
        }
    </style>
</head>
<body>

    <h1>Car Showcase</h1>

    <div class="car-container">
        <div class="car-card">
            <img src="https://via.placeholder.com/250x150" alt="Sports Car">
            <h3>Sports Car</h3>
            <p>Fast, stylish, and powerful.</p>
        </div>

        <div class="car-card">
            <img src="https://via.placeholder.com/250x150" alt="SUV">
            <h3>SUV</h3>
            <p>Comfortable and spacious for families.</p>
        </div>

        <div class="car-card">
            <img src="https://via.placeholder.com/250x150" alt="Electric Car">
            <h3>Electric Car</h3>
            <p>Eco-friendly with modern technology.</p>
        </div>
    </div>

</body>
</html>
